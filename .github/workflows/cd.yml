name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/aws_data_eng_project
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/terraform-e-commerce-pipeline-4880cae2
          token: ${{ secrets.GH_TOKEN }}
          path: terraform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init -input=false

      - name: Debug Terraform outputs
        working-directory: terraform/infra
        run: |
          terraform output

      - name: Get Terraform Outputs
        working-directory: terraform/infra
        run: |
          set -euo pipefail
          echo "CONFIG_PATH=s3://tfstate-e-commerce-pipeline-u0op6129/config.json" >> "$GITHUB_ENV"
          echo "S3_BUCKET_1=$(terraform output -raw scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_1=$(terraform output -raw glue_test_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_1=$(terraform output -raw glue_job_name)" >> $GITHUB_ENV

          echo "SFN_ARN=$(terraform output -raw state_machine_arn)" >> $GITHUB_ENV

      - name: Build S3 path
        run: |
          echo "S3_PATH_1=$S3_KEY_1" >> $GITHUB_ENV


      - name: Build Glue dependencies
        run: |
          mkdir -p req
          pip install -r requirements.txt -t req/ \
            --no-binary psycopg2-binary

      - name: Zip des libs
        run: |
          cd req
          zip -r ../dependencies.zip .

      - name: Upload dependencies to S3
        run: |
          aws s3 cp dependencies.zip s3://tfstate-e-commerce-pipeline-u0op6129/dependencies.zip

      - name: Debug S3 path
        run: |
          echo "BUCKET=$S3_BUCKET_1"
          echo "KEY=$S3_KEY_1"
          echo "FULL=$S3_PATH_1"


      - name: Replace Glue script in S3
        run: |
          aws s3 cp src/jobs/glue_ecommerce_processing.py $S3_PATH_1

      # ─── Lambda: ecommerce_producer → lambda_producer_name ───
      - name: Resolve Lambda ecommerce_producer outputs
        working-directory: terraform/infra
        run: |
          set -euo pipefail
          echo "LAMBDA_FUNCTION_NAME_1=$(terraform output -raw lambda_producer_name)" >> $GITHUB_ENV
          echo "LAMBDA_ZIP_URI_1=$(terraform output -raw lambda_producer_zip_s3_uri)" >> $GITHUB_ENV
          echo "✓ ecommerce_producer → $(terraform output -raw lambda_producer_name) @ $(terraform output -raw lambda_producer_zip_s3_uri)"

      - name: Package & upload Lambda ecommerce_producer
        run: |
          set -euo pipefail
          mkdir -p /tmp/lambda_build
          rm -rf /tmp/lambda_build/*
          cp -r src/lambdas/ecommerce_producer/. /tmp/lambda_build/ 2>/dev/null || true
          mkdir -p /tmp/lambda_build/common
          cp -r src/common/. /tmp/lambda_build/common/ 2>/dev/null || true
          touch /tmp/lambda_build/common/__init__.py

          mkdir -p /tmp/dist
          (cd /tmp/lambda_build && zip -r /tmp/dist/ecommerce_producer.zip . -x '__pycache__/*')
          aws s3 cp /tmp/dist/ecommerce_producer.zip "${LAMBDA_ZIP_URI_1}"
          echo "✓ ecommerce_producer uploaded to ${LAMBDA_ZIP_URI_1}"

      - name: Update Lambda ecommerce_producer configuration
        run: |
          set -euo pipefail
          aws lambda update-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME_1}" \
            --handler "handler.lambda_handler" \
            --environment '{"Variables":{"CONFIG_PATH":"'"${CONFIG_PATH:-}"'","LOG_LEVEL":"INFO"}}'
          echo "✓ ecommerce_producer configuration updated"

      - name: Wait for Lambda ecommerce_producer configuration update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_1}"
          echo "✓ ecommerce_producer configuration is stable"

      - name: Update Lambda ecommerce_producer code
        run: |
          set -euo pipefail
          BUCKET=$(echo "${LAMBDA_ZIP_URI_1}" | sed 's|s3://||' | cut -d/ -f1)
          KEY=$(echo "${LAMBDA_ZIP_URI_1}" | sed 's|s3://[^/]*/||')
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME_1}" \
            --s3-bucket "$BUCKET" \
            --s3-key "$KEY" \
            --publish
          echo "✓ ${LAMBDA_FUNCTION_NAME_1} code updated"

      - name: Wait for Lambda ecommerce_producer code update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_1}"
          echo "✓ ecommerce_producer code is stable"

      - name: Wait for Lambda ecommerce_producer update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_1}"
          echo "✓ ecommerce_producer is stable"

      # ─── Lambda: stream_processor → lambda_processor_name ───
      - name: Resolve Lambda stream_processor outputs
        working-directory: terraform/infra
        run: |
          set -euo pipefail
          echo "LAMBDA_FUNCTION_NAME_2=$(terraform output -raw lambda_processor_name)" >> $GITHUB_ENV
          echo "LAMBDA_ZIP_URI_2=$(terraform output -raw lambda_processor_zip_s3_uri)" >> $GITHUB_ENV
          echo "✓ stream_processor → $(terraform output -raw lambda_processor_name) @ $(terraform output -raw lambda_processor_zip_s3_uri)"

      - name: Package & upload Lambda stream_processor
        run: |
          set -euo pipefail
          mkdir -p /tmp/lambda_build
          rm -rf /tmp/lambda_build/*
          cp -r src/lambdas/stream_processor/. /tmp/lambda_build/ 2>/dev/null || true
          mkdir -p /tmp/dist
          (cd /tmp/lambda_build && zip -r /tmp/dist/stream_processor.zip . -x '__pycache__/*')
          aws s3 cp /tmp/dist/stream_processor.zip "${LAMBDA_ZIP_URI_2}"
          echo "✓ stream_processor uploaded to ${LAMBDA_ZIP_URI_2}"

      - name: Update Lambda stream_processor configuration
        run: |
          set -euo pipefail
          aws lambda update-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME_2}" \
            --handler "handler.lambda_handler" \
            --environment '{"Variables":{"CONFIG_PATH":"'"${CONFIG_PATH:-}"'","LOG_LEVEL":"INFO"}}'
          echo "✓ stream_processor configuration updated"

      - name: Wait for Lambda stream_processor configuration update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_2}"
          echo "✓ stream_processor configuration is stable"

      - name: Update Lambda stream_processor code
        run: |
          set -euo pipefail
          BUCKET=$(echo "${LAMBDA_ZIP_URI_2}" | sed 's|s3://||' | cut -d/ -f1)
          KEY=$(echo "${LAMBDA_ZIP_URI_2}" | sed 's|s3://[^/]*/||')
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME_2}" \
            --s3-bucket "$BUCKET" \
            --s3-key "$KEY" \
            --publish
          echo "✓ ${LAMBDA_FUNCTION_NAME_2} code updated"

      - name: Wait for Lambda stream_processor code update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_2}"
          echo "✓ stream_processor code is stable"

      - name: Wait for Lambda stream_processor update
        run: |
          set -euo pipefail
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME_2}"
          echo "✓ stream_processor is stable"

      # ─────────────────────────────
      # Update Glue DefaultArguments + Trigger Step Functions
      # ─────────────────────────────
      - name: Trigger ETL Pipeline via Step Functions
        run: |
          set -euo pipefail
          CONFIG_BUCKET="tfstate-e-commerce-pipeline-u0op6129"

          # Patch DefaultArguments de chaque Glue job via jq (conserve Role + Command existants)
          patch_glue_args() {
            local JOB_NAME=$1
            echo "[patch] $JOB_NAME"
            UPDATED=$(aws glue get-job --job-name "$JOB_NAME" --query 'Job' --output json | \
              jq --arg cfg "s3://${CONFIG_BUCKET}/config.json" \
                 --arg deps "s3://${CONFIG_BUCKET}/dependencies.zip" \
              '{Role:.Role, Command:.Command, DefaultArguments:(.DefaultArguments + {"--CONFIG_PATH":$cfg,"--extra-py-files":$deps})}')
            aws glue update-job --job-name "$JOB_NAME" --job-update "$UPDATED"
            echo "  ✓ $JOB_NAME patched"
          }

          patch_glue_args "$GLUE_JOB_1"

          # Lancer Step Functions
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "$SFN_ARN" \
            --input '{}' \
            --query "executionArn" --output text)
          echo "EXECUTION_ARN=$EXECUTION_ARN" >> $GITHUB_ENV
          echo "Execution lancée : $EXECUTION_ARN"

      - name: Smoke Test - Validate Step Functions Execution
        run: |
          set -euo pipefail
          MAX_RETRIES=40
          SLEEP_TIME=30
          COUNT=0
          STATUS="RUNNING"

          echo "▶ Surveillance de l'exécution : $EXECUTION_ARN"

          while [[ "$STATUS" == "RUNNING" ]]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXECUTION_ARN" \
              --query "status" \
              --output text)
            echo "  → $STATUS"
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
              echo "❌ TIMEOUT après $((MAX_RETRIES * SLEEP_TIME)) secondes"
              exit 1
            fi
            sleep "$SLEEP_TIME"
          done

          if [ "$STATUS" != "SUCCEEDED" ]; then
            echo "❌ Pipeline échoué — état final : $STATUS"
            exit 1
          fi

          echo "✅ Pipeline ETL terminé avec succès."

      # ─────────────────────────────
      # SQS producer/consumer flow
      # Producer first, then wait, then consumer
      # ─────────────────────────────
      - name: Resolve SQS producer/consumer outputs
        working-directory: terraform/infra
        run: |
          set -euo pipefail
          echo "QUEUE_URL_1=$(terraform output -raw sqs_queue_url)" >> $GITHUB_ENV
          echo "PRODUCER_RESOURCE_REF_1=$(terraform output -raw lambda_producer_arn)" >> $GITHUB_ENV
          echo "CONSUMER_RESOURCE_REF_1=$(terraform output -raw state_machine_arn)" >> $GITHUB_ENV
          echo "PRODUCER_TYPE_1=lambda" >> $GITHUB_ENV
          echo "CONSUMER_TYPE_1=stepfunctions" >> $GITHUB_ENV
          echo "PRODUCER_PAYLOAD_1={}" >> $GITHUB_ENV
          echo "CONSUMER_PAYLOAD_1={}" >> $GITHUB_ENV
          echo "CONFIG_PATH=s3://tfstate-e-commerce-pipeline-u0op6129/config.json" >> $GITHUB_ENV

      - name: Trigger SQS producer 1
        run: |
          set -euo pipefail
          cat <<'EOF' > /tmp/sqs_producer_1.json
          {}
          EOF
          python -c 'import json, os, pathlib; p=pathlib.Path("/tmp/sqs_producer_1.json"); payload=json.loads(p.read_text()); payload["CONFIG_PATH"] = os.environ.get("CONFIG_PATH", ""); p.write_text(json.dumps(payload))'

          if [ "$PRODUCER_TYPE_1" = "lambda" ]; then
            aws lambda invoke \
              --function-name "$PRODUCER_RESOURCE_REF_1" \
              --payload file:///tmp/sqs_producer_1.json \
              --cli-binary-format raw-in-base64-out \
              /tmp/sqs_producer_1.json
            echo "✓ Producer $PRODUCER_RESOURCE_REF_1 triggered for queue $QUEUE_URL_1"
          elif [ "$PRODUCER_TYPE_1" = "stepfunctions" ]; then
            aws stepfunctions start-execution \
              --state-machine-arn "$PRODUCER_RESOURCE_REF_1" \
              --input file:///tmp/sqs_producer_1.json \
              --query "executionArn" --output text
            echo "✓ Producer state machine $PRODUCER_RESOURCE_REF_1 started for queue $QUEUE_URL_1"
          else
            echo "Unsupported SQS producer_type $PRODUCER_TYPE_1 for $PRODUCER_RESOURCE_REF_1"
            exit 1
          fi

      - name: Wait for SQS messages after producer 1
        run: |
          set -euo pipefail
          MAX_WAIT_SECONDS=120
          POLL_INTERVAL_SECONDS=5
          ELAPSED=0
          while true; do
            MSG_COUNT=$(aws sqs get-queue-attributes \
              --queue-url "$QUEUE_URL_1" \
              --attribute-names ApproximateNumberOfMessages \
              --query 'Attributes.ApproximateNumberOfMessages' \
              --output text)
            if [ "$MSG_COUNT" -gt 0 ]; then
              echo "Detected $MSG_COUNT messages in queue $QUEUE_URL_1"
              break
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT_SECONDS" ]; then
              echo "Timeout waiting for SQS messages on $QUEUE_URL_1"
              exit 1
            fi
            sleep $POLL_INTERVAL_SECONDS
            ELAPSED=$((ELAPSED + POLL_INTERVAL_SECONDS))
          done

      - name: Trigger SQS consumer 1
        run: |
          set -euo pipefail
          cat <<'EOF' > /tmp/sqs_consumer_1.json
          {}
          EOF
          python -c 'import json, os, pathlib; p=pathlib.Path("/tmp/sqs_consumer_1.json"); payload=json.loads(p.read_text()); payload["CONFIG_PATH"] = os.environ.get("CONFIG_PATH", ""); p.write_text(json.dumps(payload))'

          if [ "$CONSUMER_TYPE_1" = "lambda" ]; then
            aws lambda invoke \
              --function-name "$CONSUMER_RESOURCE_REF_1" \
              --payload file:///tmp/sqs_consumer_1.json \
              --cli-binary-format raw-in-base64-out \
              /tmp/sqs_consumer_1.json
            echo "✓ Consumer $CONSUMER_RESOURCE_REF_1 triggered after producer"
          elif [ "$CONSUMER_TYPE_1" = "stepfunctions" ]; then
            aws stepfunctions start-execution \
              --state-machine-arn "$CONSUMER_RESOURCE_REF_1" \
              --input file:///tmp/sqs_consumer_1.json \
              --query "executionArn" --output text
            echo "✓ Consumer state machine $CONSUMER_RESOURCE_REF_1 started after producer"
          else
            echo "Unsupported SQS consumer_type $CONSUMER_TYPE_1 for $CONSUMER_RESOURCE_REF_1"
            exit 1
          fi

