name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/aws_data_eng_project
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/terraform-infra-87332392
          token: ${{ secrets.GH_TOKEN }}
          path: terraform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init -input=false

      - name: Debug Terraform outputs
        working-directory: terraform/infra
        run: |
          terraform output

      - name: Get Terraform Outputs
        working-directory: terraform/infra
        run: |
          set -euo pipefail
          echo "CONFIG_PATH=s3://tfstate-infra-ok12aisb/config.json" >> "$GITHUB_ENV"
          echo "S3_BUCKET_1=$(terraform output -raw scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_1=$(terraform output -raw validate_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_1=$(terraform output -raw validate_job_name)" >> $GITHUB_ENV

          echo "S3_BUCKET_2=$(terraform output -raw scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_2=$(terraform output -raw sqlgen_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_2=$(terraform output -raw sqlgen_job_name)" >> $GITHUB_ENV

          echo "S3_BUCKET_3=$(terraform output -raw scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_3=$(terraform output -raw rdsload_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_3=$(terraform output -raw rdsload_job_name)" >> $GITHUB_ENV

          echo "SFN_ARN_1=$(terraform output -raw state_machine_arn)" >> $GITHUB_ENV

      - name: Build S3 path
        run: |
          echo "S3_PATH_1=$S3_KEY_1" >> $GITHUB_ENV

          echo "S3_PATH_2=$S3_KEY_2" >> $GITHUB_ENV

          echo "S3_PATH_3=$S3_KEY_3" >> $GITHUB_ENV


      - name: Build Glue dependencies
        run: |
          set -euo pipefail
          mkdir -p req
          if [ -s requirements.txt ]; then
            pip install -r requirements.txt -t req/ \
              --no-binary psycopg2-binary
          else
            echo "requirements.txt is empty or missing; skipping pip install"
          fi
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          req_dir = Path('req')
          with ZipFile('dependencies.zip', 'w', ZIP_DEFLATED) as archive:
              for path in req_dir.rglob('*'):
                  if path.is_file():
                      archive.write(path, path.relative_to(req_dir))
          PY

      - name: Upload dependencies to S3
        run: |
          aws s3 cp dependencies.zip s3://tfstate-infra-ok12aisb/dependencies.zip

      - name: Debug S3 path
        run: |
          echo "BUCKET=$S3_BUCKET_1"
          echo "KEY=$S3_KEY_1"
          echo "FULL=$S3_PATH_1"


      - name: Replace Glue script in S3
        run: |
          aws s3 cp src/jobs/glue_ecommerce_processing.py $S3_PATH_1
          aws s3 cp src/jobs/glue_rds_load.py $S3_PATH_2
          aws s3 cp src/jobs/glue_rds_load.py $S3_PATH_3

      # ─── Lambda: ecommerce_producer (unmapped — upload only) ───
      - name: Package & upload Lambda ecommerce_producer
        run: |
          set -euo pipefail
          mkdir -p /tmp/dist
          (cd src/lambdas/ecommerce_producer && zip -r /tmp/dist/ecommerce_producer.zip . -x '__pycache__/*')
          BUCKET=$(cd terraform/infra && terraform output -raw data_bucket_name)
          aws s3 cp /tmp/dist/ecommerce_producer.zip "s3://$BUCKET/lambda/ecommerce_producer.zip"
          echo "⚠ ecommerce_producer: uploaded to s3://$BUCKET/lambda/ecommerce_producer.zip but no function mapping → code NOT updated"

      # ─── Lambda: stream_processor (unmapped — upload only) ───
      - name: Package & upload Lambda stream_processor
        run: |
          set -euo pipefail
          mkdir -p /tmp/dist
          (cd src/lambdas/stream_processor && zip -r /tmp/dist/stream_processor.zip . -x '__pycache__/*')
          BUCKET=$(cd terraform/infra && terraform output -raw data_bucket_name)
          aws s3 cp /tmp/dist/stream_processor.zip "s3://$BUCKET/lambda/stream_processor.zip"
          echo "⚠ stream_processor: uploaded to s3://$BUCKET/lambda/stream_processor.zip but no function mapping → code NOT updated"

      # ─────────────────────────────
      # Trigger Step Functions
      # ─────────────────────────────
      - name: Trigger Step Functions 1 - aws_sfn_state_machine.pipeline
        run: |
          set -euo pipefail
          CONFIG_BUCKET="tfstate-infra-ok12aisb"
          CONFIG_PATH="s3://${CONFIG_BUCKET}/config.json"
          DEPS_PATH="s3://${CONFIG_BUCKET}/dependencies.zip"

          # Lancer Step Functions
          SFN_INPUT=$(jq -nc --arg config "$CONFIG_PATH" --arg deps "$DEPS_PATH" '{"CONFIG_PATH":$config,"DEPS_PATH":$deps}')
          EXECUTION_ARN_1=$(aws stepfunctions start-execution --state-machine-arn "${SFN_ARN_1}" --input "$SFN_INPUT" --query "executionArn" --output text)
          echo "EXECUTION_ARN_1=${EXECUTION_ARN_1}" >> $GITHUB_ENV
          echo "Execution lancée pour aws_sfn_state_machine.pipeline : ${EXECUTION_ARN_1}"

      - name: Smoke Test - Validate Step Functions 1 - aws_sfn_state_machine.pipeline
        run: |
          set -euo pipefail
          MAX_RETRIES=40
          SLEEP_TIME=30
          COUNT=0
          STATUS="RUNNING"

          echo "▶ Surveillance de l'exécution aws_sfn_state_machine.pipeline : ${EXECUTION_ARN_1}"

          while [[ "$STATUS" == "RUNNING" ]]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "${EXECUTION_ARN_1}" \
              --query "status" \
              --output text)
            echo "  → $STATUS"
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
              echo "❌ TIMEOUT après $((MAX_RETRIES * SLEEP_TIME)) secondes"
              exit 1
            fi
            sleep "$SLEEP_TIME"
          done

          if [ "$STATUS" != "SUCCEEDED" ]; then
            echo "❌ Pipeline échoué — état final : $STATUS"
            exit 1
          fi

          STATE_MACHINE_DEFINITION=$(aws stepfunctions describe-state-machine --state-machine-arn "${SFN_ARN_1}" --query definition --output text)
          EXPECTED_STATES=$(printf '%s' "$STATE_MACHINE_DEFINITION" | jq -r 'def collect:  [(.States // {}) | keys[]] +  [(.States // {}) | to_entries[]    | (.value.Branches[]? | collect),      ((.value.Iterator? // .value.ItemProcessor? // empty) | collect)  ];collect | flatten | unique | .[]' | sort -u)
          ENTERED_STATES=$(aws stepfunctions get-execution-history --execution-arn "${EXECUTION_ARN_1}" --output json | jq -r ".events[] | select(.type | endswith(\"StateEntered\")) | .stateEnteredEventDetails.name" | sort -u)
          MISSING_STATES=$(comm -23 <(printf "%s\n" "$EXPECTED_STATES") <(printf "%s\n" "$ENTERED_STATES"))
          if [ -n "$MISSING_STATES" ]; then
            echo "Missing states:"
            printf "%s\n" "$MISSING_STATES"
            exit 1
          fi
          echo "✅ Step Functions smoke test covered all defined states for aws_sfn_state_machine.pipeline."

          echo "✅ Tous les workflows Step Functions sont passés."

          echo "✅ Pipeline ETL terminé avec succès."
